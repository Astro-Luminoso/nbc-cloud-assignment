# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write # OIDC 토큰 요청용
  contents: read # 코드 체크아웃용 (체크아웃 - Repo에 있는 코드를 Runner에 옮김)

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Cache
      uses: actions/cache@v5.0.5
      with:
        # A list of files, directories, and wildcard patterns to cache and restore
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        # An explicit key for restoring and saving the cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        # An ordered multiline string listing the prefix-matched keys, that are used for restoring stale cache if no cache hit occurred for key. Note `cache-hit` returns false in this case.
        # Optional
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    # Step 4 Run Test
    - name: Run Tests
      run: ./gradlew test
    
    # Step 5 Jar Build
    - name: Build JAR
      run: ./gradlew bootJar

    # Step 6 AWS 자격증명 OIDC
    - name: Config AWS Credential
      uses: aws-actions/configure-aws-credentials@v6.1.2
      with:
        # AWS Region, e.g. us-east-2
        aws-region: ${{vars.AWS_REGION}}
        # The Amazon Resource Name (ARN) of the role to assume. Use the provided credentials to assume an IAM role and configure the Actions environment with the assumed role credentials rather than with the provided credentials.
        # optional
        role-to-assume: ${{vars.AWS_ROLE_ARN}}

    #Step 7 ECR Login
    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    # Step 8 Docker Build and Push
    - name: Build and Push Docker Image
      run: |
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        IMAGE_URI=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}
        
        docker build --platform linux/arm64 -t $IMAGE_URI:$SHORT_SHA .

        docker push $IMAGE_URI:$SHORT_SHA

        echo "✅ Pushed: $IMAGE_URI:$SHORT_SHA"

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'   # main push에서만 배포 (PR에서는 CI만 실행)
    runs-on: ubuntu-latest

    steps:
      # Step 1: AWS 자격증명 - OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Step 2: Launch Template 새 버전 생성 (User Data의 IMAGE_TAG를 새 커밋 SHA로 교체)
      - name: Update Launch Template
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          LAUNCH_TEMPLATE_ID: ${{ vars.LAUNCH_TEMPLATE_ID }}
          ENV_VAR_PATH: ${{ vars.AWS_ENV_VAR_PATH }}
        run: |
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          
          USER_DATA=$(cat <<'USERDATA' | sed "s|__IMAGE_TAG__|${IMAGE_TAG}|g; s|__AWS_ACCOUNT_ID__|${AWS_ACCOUNT_ID}|g; s|__AWS_REGION__|${AWS_REGION}|g; s|__ECR_REPOSITORY__|${ECR_REPOSITORY}|g" | base64 -w 0
          #!/bin/bash
          set -e
          AWS_REGION="__AWS_REGION__"
          AWS_ACCOUNT_ID="__AWS_ACCOUNT_ID__"
          ECR_REPOSITORY="__ECR_REPOSITORY__"
          IMAGE_TAG="__IMAGE_TAG__"
          ENV_VAR_PATH="__ENV_VAR_PATH__"
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          dnf update -y
          dnf install -y docker
          systemctl enable docker
          systemctl start docker
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
          docker pull ${ECR_URI}:${IMAGE_TAG}
          docker run -d -p 8080:8080 --restart unless-stopped --name ci-demo -e AWS_PARAMETERSTORE_PATH=${ENV_VAR_PATH} ${ECR_URI}:${IMAGE_TAG}
          USERDATA
          )
          
          NEW_VERSION=$(aws ec2 create-launch-template-version \
            --launch-template-id ${LAUNCH_TEMPLATE_ID} \
            --source-version '$Latest' \
            --launch-template-data "{\"UserData\":\"${USER_DATA}\"}" \
            --query 'LaunchTemplateVersion.VersionNumber' \
            --output text)
          
          echo "✅ Launch Template v${NEW_VERSION} 생성 완료"
          
          aws ec2 modify-launch-template \
            --launch-template-id ${LAUNCH_TEMPLATE_ID} \
            --default-version ${NEW_VERSION}
          
          echo "✅ 기본 버전 → v${NEW_VERSION} 변경 완료"

      # Step 3: Instance Refresh 시작
      - name: Start Instance Refresh
        id: refresh
        env:
          ASG_NAME: ${{ vars.ASG_NAME }}
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${ASG_NAME} \
            --preferences '{
              "MinHealthyPercentage": 100,
              "InstanceWarmup": 120
            }' \
            --query 'InstanceRefreshId' \
            --output text)
          
          echo "refresh_id=${REFRESH_ID}" >> $GITHUB_OUTPUT
          echo "✅ Instance Refresh 시작: ${REFRESH_ID}"

      # Step 4: Instance Refresh 완료 대기
      - name: Wait for Instance Refresh
        env:
          ASG_NAME: ${{ vars.ASG_NAME }}
          REFRESH_ID: ${{ steps.refresh.outputs.refresh_id }}
        run: |
          echo "⏳ Instance Refresh 완료 대기 중..."
          
          for i in $(seq 1 30); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name ${ASG_NAME} \
              --instance-refresh-ids ${REFRESH_ID} \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
          
            echo "시도 ${i}/30 - 상태: ${STATUS}"
          
            if [ "${STATUS}" = "Successful" ]; then
              echo "✅ Instance Refresh 성공! 배포 완료!"
              exit 0
            elif [ "${STATUS}" = "Failed" ] || [ "${STATUS}" = "Cancelled" ]; then
              echo "❌ Instance Refresh 실패: ${STATUS}"
              exit 1
            fi
          
            sleep 30
          done
          
          echo "❌ Instance Refresh 타임아웃 (15분 초과)"
          exit 1
      

    # NOTE: The Gradle Wrapper is the default and recommended way to run Gradle (https://docs.gradle.org/current/userguide/gradle_wrapper.html).
